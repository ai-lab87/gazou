    <script>
        const output = document.getElementById('prompt-output');

        function addTextToPrompt(value) {
            if (!value) return;
            let currentText = output.value.trim();

            if (value.startsWith('--')) {
                if (currentText === '') {
                    output.value = value;
                } else {
                    if (currentText.endsWith(',')) {
                        currentText = currentText.slice(0, -1).trim();
                    }
                    output.value = currentText + ' ' + value;
                }
            } else {
                let paramIndex = currentText.search(/(?:^|\s)--[a-zA-Z]/);
                
                if (paramIndex !== -1) {
                    let promptPart = currentText.substring(0, paramIndex).trim();
                    let paramPart = currentText.substring(paramIndex).trim();
                    
                    if (promptPart === '') {
                        output.value = value + ' ' + paramPart;
                    } else {
                        output.value = promptPart + (promptPart.endsWith(',') ? ' ' : ", ") + value + " " + paramPart;
                    }
                } else {
                    if (currentText === '') {
                        output.value = value;
                    } else {
                        output.value = currentText + (currentText.endsWith(',') ? ' ' : ", ") + value;
                    }
                }
            }
        }

        function addFromSelect(selectId) {
            const select = document.getElementById(selectId);
            addTextToPrompt(select.value);
            const btn = select.nextElementSibling;
            btn.innerHTML = '✔';
            setTimeout(() => { btn.innerHTML = '追加'; }, 800);
            select.selectedIndex = 0;
        }

        function addRealBase() {
            const urlInput = document.getElementById('base-image-url');
            const url = urlInput.value.trim();
            let iw = document.getElementById('base-image-iw').value;
            if (url) {
                let currentText = output.value.trim();
                output.value = url + " " + currentText;
                if(!iw) iw = "0.8";
                addTextToPrompt(`--iw ${iw}`);
                urlInput.value = '';
                const btn = document.getElementById('btn-add-url');
                btn.innerHTML = '✔ 追加完了';
                setTimeout(() => { btn.innerHTML = '追加'; }, 800);
            } else {
                alert("画像URLを入力してください");
            }
        }

        function applyRealSpells(gender) {
            const keepComp = document.getElementById('real-keep-composition').checked;
            const baseReal = "photorealistic, highly detailed, realistic skin texture, 8k resolution, cinematic lighting";
            const framingPrefix = keepComp ? "" : "portrait photograph, ";
            const femaleSpecific = "gentle soft smile, young Japanese woman";
            const maleSpecific = "distinct jawline, young Japanese handsome man";
            let promptToAdd = gender === 'female' ? framingPrefix + femaleSpecific + ", " + baseReal : framingPrefix + maleSpecific + ", " + baseReal;
            addTextToPrompt(promptToAdd);
            const btnClass = gender === 'female' ? '.real-btn-female' : '.real-btn-male';
            const btn = document.querySelector(btnClass);
            btn.innerHTML = '✔ リアル魔法付与';
            setTimeout(() => { btn.innerHTML = gender === 'female' ? '👩 リアル美女化' : '👨 リアル美男化'; }, 1000);
        }

        function addTextGenerationPrompt() {
            const contentInput = document.getElementById('text-content');
            const styleSelect = document.getElementById('text-style');
            const rawContent = contentInput.value.trim();
            const selectedStyle = styleSelect.value;
            
            if (rawContent) {
                addTextToPrompt('"' + rawContent + '"');
                if (selectedStyle !== "") {
                    addTextToPrompt(selectedStyle);
                }
                if (!output.value.includes('--v 8')) {
                    addTextToPrompt('--v 8.0');
                }
                contentInput.value = '';
                styleSelect.selectedIndex = 0;
                const btn = document.getElementById('btn-add-text');
                btn.innerHTML = '✔ テキスト追加';
                setTimeout(() => { btn.innerHTML = '追加'; }, 800);
            } else {
                alert("画像に入れるテキスト（文字）を入力してください");
            }
        }

        function generateBannerPrompt() {
            const textInput = document.getElementById('banner-text');
            const styleSelect = document.getElementById('banner-style');
            const subjectSelect = document.getElementById('banner-subject');
            const poseSelect = document.getElementById('banner-pose');
            const bgSelect = document.getElementById('banner-bg');
            const isAnime = document.getElementById('banner-is-anime').checked;

            const rawContent = textInput.value.trim();
            if (!rawContent) {
                alert("バナーに入れる文字を入力してください！");
                return;
            }

            let existingPrompt = output.value.trim();
            let paramIndex = existingPrompt.search(/(?:^|\s)--[a-zA-Z]/);
            let existingPromptMain = "";
            if (paramIndex !== -1) {
                existingPromptMain = existingPrompt.substring(0, paramIndex).trim();
            } else {
                existingPromptMain = existingPrompt;
            }

            let textElement = '"' + rawContent + '"';
            if (styleSelect.value !== "") {
                textElement = styleSelect.value + " \"" + rawContent + "\"";
            }

            let subjectElement = subjectSelect.value;
            if (subjectSelect.value === "" && poseSelect.value !== "") {
                subjectElement = isAnime ? "1girl" : "photorealistic Japanese young woman";
            }

            // ダブルクォーテーション直後のカンマを確実に入れる（文字化け回避）
            let characterPart = "";
            if (subjectSelect.value === "none") {
                characterPart = ""; 
            } else if (subjectElement && poseSelect.value) {
                characterPart = ", " + subjectElement + ", " + poseSelect.value;
            } else if (subjectElement) {
                characterPart = ", " + subjectElement;
            }

            let bgPart = "";
            if (bgSelect.value) {
                bgPart = ", " + bgSelect.value;
            }
            let qualityTags = isAnime ? ", masterpiece, best quality, anime style illustration" : ", photorealistic, highly detailed";
            
            // 通常プロンプトを文字列の途中に差し込む（上書きしない）
            let newPromptMain = textElement + characterPart;

            if (existingPromptMain !== "") {
                 newPromptMain += ", " + existingPromptMain;
            }
            
            newPromptMain += bgPart + qualityTags;

            let negativeTags = isAnime ? "" : "--no anime, cartoon, illustration";
            
            // 出力欄をリセットしてから構築し直す（パラメータをきれいに末尾につけるため）
            output.value = "";
            addTextToPrompt(newPromptMain.trim());

            if (!output.value.includes('--ar 5:1')) {
                addTextToPrompt('--ar 5:1');
            }
            if (!output.value.includes('--v 8')) {
                addTextToPrompt('--v 8.0');
            }
            if (negativeTags && !output.value.includes('--no anime')) {
                 addTextToPrompt(negativeTags);
            }

            const btn = document.querySelector('.banner-btn');
            btn.innerHTML = '✔ バナー錬成準備完了';
            btn.style.backgroundColor = '#48bb78';
            setTimeout(() => { 
                btn.innerHTML = '✨ V8 バナー錬成 (完全体システム)'; 
                btn.style.backgroundColor = '#dd6b20'; 
            }, 1500);

            textInput.value = '';
            styleSelect.selectedIndex = 0;
            subjectSelect.selectedIndex = 0;
            poseSelect.selectedIndex = 0;
            bgSelect.selectedIndex = 0;
        }

        // 🌟 完全復活：ガチャシステムのランダム抽選ロジック 🌟
        function generateRandomPrompt(type) {
            clearPrompt();
            
            const animeCategories = ['sel-subject', 'sel-nationality', 'sel-hair-color', 'sel-hair-style', 'sel-expression', 'sel-tops', 'sel-bottoms', 'sel-shoes', 'sel-acc', 'sel-bg', 'sel-effect', 'sel-action'];
            const realCategories = ['sel-hair-color', 'sel-hair-style', 'sel-tops', 'sel-bottoms', 'sel-shoes', 'sel-acc', 'sel-bg', 'sel-effect', 'sel-action'];
            
            let parts = [];
            
            if (type === 'anime') {
                animeCategories.forEach(id => {
                    const select = document.getElementById(id);
                    if(!select) return;
                    const options = Array.from(select.options).filter(opt => opt.value !== '' && !opt.value.startsWith('--'));
                    if(options.length > 0) {
                        const randomOpt = options[Math.floor(Math.random() * options.length)];
                        parts.push(randomOpt.value);
                    }
                });
                
                output.value = parts.join(', ') + ', masterpiece, best quality --ar 9:16 --niji 6';
                
                const btn = document.querySelector('.btn-gacha-anime');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✨ アニメ錬成！';
                setTimeout(() => { btn.innerHTML = originalText; }, 1000);
                
            } else if (type === 'real') {
                realCategories.forEach(id => {
                    const select = document.getElementById(id);
                    if(!select) return;
                    const options = Array.from(select.options).filter(opt => opt.value !== '' && !opt.value.startsWith('--'));
                    if(options.length > 0) {
                        const randomOpt = options[Math.floor(Math.random() * options.length)];
                        parts.push(randomOpt.value);
                    }
                });

                const isJpFix = document.getElementById('gacha-jp-fix').checked;
                const isFemale = Math.random() > 0.3;
                
                let baseSubject = "";
                if (isJpFix) {
                    baseSubject = isFemale ? "photorealistic Japanese young woman" : "photorealistic handsome Japanese young man";
                } else {
                    baseSubject = isFemale ? "photorealistic young woman" : "photorealistic handsome young man";
                }

                const safeRealExpressions = ["gentle soft smile", "calm expression", "slight smile", "cool gaze", "natural relaxed expression"];
                const safeExpression = safeRealExpressions[Math.floor(Math.random() * safeRealExpressions.length)];
                
                const realNegative = "--no anime, cartoon, illustration, painting, exaggerated expressions";
                
                output.value = baseSubject + ', ' + safeExpression + ', ' + parts.join(', ') + ', highly detailed, photorealistic, 8k, cinematic lighting ' + realNegative + ' --ar 9:16 --v 6.1';
                
                const btn = document.querySelector('.btn-gacha-real');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✨ リアル錬成！';
                setTimeout(() => { btn.innerHTML = originalText; }, 1000);
            }
        }

        function applyPerfectStandingMode() {
            addTextToPrompt("full body shot, standing straight on two feet, centered composition, looking at viewer");
            addTextToPrompt("--no floor, shadow");
            
            const btn = document.querySelector('.btn-standing');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✨ 追加完了！';
            setTimeout(() => { btn.innerHTML = originalText; }, 1000);
        }

        function clearPrompt() { output.value = ''; }
        function copyPrompt() {
            output.select(); document.execCommand('copy');
            const copyBtn = document.querySelector('.btn-copy');
            copyBtn.innerHTML = '✅ コピー完了！';
            setTimeout(() => { copyBtn.innerHTML = '📋 コピー'; }, 2000);
        }
    </script>

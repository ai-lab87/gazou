<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIちゃん実験室・LINEスタンプ工場 Ver 2.2🧪✨</title>
    <style>
        /* --- クールな背景（ダークグラデーション＆ワークショップ仕様） --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #111827;
            background-image: 
                radial-gradient(at 10% 20%, rgba(31, 41, 58, 0.3) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(17, 24, 39, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: #f3f4f6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 120px;
        }

        h1 { text-align: center; color: #f9fafb; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .description { text-align: center; color: #9ca3af; margin-bottom: 20px; font-size: 14px; }

        /* --- プロンプトメーカーへのバナーリンク（画像差し替え版） --- */
        .prompt-maker-banner {
            display: block;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 25px;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .prompt-maker-banner:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
        }
        .prompt-maker-banner img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 不要になった banner-text のCSSは削除しました */

        /* --- セクションのデザイン --- */
        .config-section, .stamp-section {
            background-color: #1f293a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .flex-item { flex: 1; min-width: 250px; }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #f9fafb; font-size: 14px; }
        
        textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #374151;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            background-color: #374151;
            color: #f9fafb;
            transition: border-color 0.2s, background-color 0.2s;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
            background-color: #1f293a;
        }
        textarea { resize: vertical; }
        
        .reset-all-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s, transform 0.1s;
            display: block;
            margin-left: auto;
        }
        .reset-all-btn:hover { background-color: #dc2626; transform: translateY(-1px); }
        .reset-all-btn:active { transform: translateY(0); }

        /* --- スタンプセクションのボタン --- */
        .category-container { margin-bottom: 20px; }
        .category-title { font-size: 16px; font-weight: bold; color: #f9fafb; margin-bottom: 10px; border-left: 4px solid #3498db; padding-left: 10px; }
        
        .button-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
        .stamp-button {
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 6px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            color: #f3f4f6;
            font-weight: bold;
        }
        .stamp-button:hover {
            background-color: #4b5563;
            border-color: #6b7280;
            transform: translateY(-1px);
        }
        .stamp-button.active {
            border-color: #3498db;
            color: white;
            background-color: #1d4ed8;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.6);
        }
        
        /* --- 出力バー --- */
        .output-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111827;
            padding: 15px 20px;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .output-text {
            flex-grow: 1;
            border-radius: 4px;
            padding: 12px;
            border: 1px solid #374151;
            font-size: 13px;
            background-color: #374151;
            color: #f9fafb;
        }
        .action-buttons { display: flex; gap: 10px; flex-shrink: 0; }
        
        .copy-button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .copy-button:hover { background-color: #2980b9; transform: translateY(-1px); }
        .copy-button:active { transform: translateY(0); }
        
        #clear_selection_button {
            background-color: #6b7280;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        #clear_selection_button:hover { background-color: #4b5563; }
    </style>
</head>
<body>

    <a href="https://ai-lab87.github.io/gazou/" target="_blank" class="prompt-maker-banner">
        <img src="https://cdn.midjourney.com/bac8cfe3-f43d-4603-8989-245bb6b95375/0_1.jpeg" alt="プロンプトメーカーはこちら">
        </a>

    <h1>AIちゃん実験室・LINEスタンプ工場 Ver 2.2🧪✨</h1>
    <p class="description">V8の文字生成を活用して、40個分のスタンププロンプトを爆速で量産します。</p>

    <div class="config-section">
        <label for="char_base">1. キャラクターの基本設定（日本語OK）</label>
        <textarea id="char_base" rows="3" placeholder="例: 黒と白のツートンカラーの髪の女の子、青い目、黒いオーバーサイズのTシャツを着ている"></textarea>
        
        <div class="flex-row" style="margin-top: 15px;">
            <div class="flex-item">
                <label for="art_style">2. 画風（テイスト）</label>
                <select id="art_style">
                    <option value="anime style, flat color">アニメ調（フラット・基本）</option>
                    <option value="chibi anime style, kawaii">ちびキャラ風</option>
                    <option value="watercolor style, soft lighting">水彩画風</option>
                    <option value="pop art style, vibrant colors">ポップアート風</option>
                    <option value="retro 90s anime style">90年代レトロアニメ風</option>
                    <option value="3D render, cute Pixar style">3D・ピクサー風</option>
                    <option value="pixel art, cute dots">ドット絵風</option>
                </select>
            </div>
            <div class="flex-item">
                <label for="text_style">3. 文字のフォント感</label>
                <select id="text_style">
                    <option value="bold pop font">太字のポップ風</option>
                    <option value="cute handwritten marker">可愛い手書きマーカー風</option>
                    <option value="elegant calligraphy">筆文字・カリグラフィー風</option>
                    <option value="simple bold sans-serif">シンプルなゴシック太字</option>
                    <option value="neon light text, glowing">ネオンサイン風</option>
                    <option value="luxury gold text, shiny">ゴールド（金箔）風</option>
                </select>
            </div>
        </div>
        <button id="reset_all_button" class="reset-all-btn">🗑️ 全設定クリア</button>
    </div>

    <div class="stamp-section">
        <label>4. スタンプを選択（全40種類）</label>
        <div id="stamp_buttons_container">
            </div>
    </div>

    <div class="output-section" id="output_section">
        <textarea class="output-text" id="prompt_output" readonly rows="2"></textarea>
        <div class="action-buttons">
            <button class="copy-button" id="copy_button">コピー</button>
            <button id="clear_selection_button">閉じる</button>
        </div>
    </div>

    <script>
        // --- スタンプデータ（全40個） ---
        const stampData = [
            { name: '👋 挨拶', stamps: [
                { text: 'ありがとう', prompt: 'bowing, smiling' },
                { text: 'おはよう', prompt: 'stretching, yawning' },
                { text: 'お疲れ様', prompt: 'relaxing, holding a coffee cup' },
                { text: 'こんにちは', prompt: 'waving hands, friendly smile' },
                { text: 'おやすみ', prompt: 'sleeping in a blanket, moon and stars' },
                { text: '了解', prompt: 'saluting, thumbs up' },
                { text: 'NG', prompt: 'crossing arms, X sign' },
                { text: 'またね', prompt: 'walking away, waving' }
            ]},
            { name: '😃 感情', stamps: [
                { text: 'いいね', prompt: 'giving a thumbs up, winking' },
                { text: 'すごい', prompt: 'clapping hands, starry eyes' },
                { text: 'わーい', prompt: 'jumping with joy, throwing up hands' },
                { text: '泣く', prompt: 'crying, big tears' },
                { text: '怒る', prompt: 'angry face, puffing cheeks, steam from ears' },
                { text: '焦る', prompt: 'sweating, panicked face' },
                { text: '照れる', prompt: 'blushing, covering face with hands' },
                { text: 'ショック', prompt: 'shocked face, pale, with a dark cloud' },
                { text: '？？', prompt: 'confused, head tilted, question marks' },
                { text: 'びっくり', prompt: 'wide eyed, hands on mouth' }
            ]},
            { name: '🛠️ 日常アクション', stamps: [
                { text: 'コーヒー', prompt: 'holding a mug, relaxing, steam rising' },
                { text: '食事中', prompt: 'eating ramen with chopsticks' },
                { text: '勉強中', prompt: 'reading a book with glasses' },
                { text: '仕事中', prompt: 'typing on a laptop, busy look' },
                { text: '睡眠中', prompt: 'snoring, zzz marks' },
                { text: '電話中', prompt: 'holding a phone to ear' },
                { text: '散歩中', prompt: 'walking, listening to music with headphones' },
                { text: '運動中', prompt: 'running, sweating' },
                { text: 'ゲーム中', prompt: 'holding a controller, intense focus' },
                { text: '読書中', prompt: 'sitting and reading an oversized book' }
            ]},
            { name: '📩 メッセージ', stamps: [
                { text: '待って', prompt: 'holding up a hand, stop sign' },
                { text: '行く', prompt: 'pointing forward, determined look' },
                { text: 'OK', prompt: 'making an O with hands' },
                { text: 'キャンセル', prompt: 'making an X with hands' },
                { text: 'おめでとう', prompt: 'throwing confetti, holding balloons' },
                { text: 'よろしく', prompt: 'bowing deeply, sincere smile' },
                { text: 'ごめん', prompt: 'apologizing, hands pressed together, sad eyes' },
                { text: '秘密', prompt: 'finger on lips, "shh" pose' },
                { text: 'がんばれ', prompt: 'fist pumping, encouraging look' },
                { text: 'おねがい', prompt: 'puppy dog eyes, hands clasped' }
            ]},
            { name: '✨ その他', stamps: [
                { text: 'LOVE', prompt: 'holding a big heart shape' },
                { text: 'きらきら', prompt: 'sparkling effect around character' }
            ]}
        ];

        const charBase = document.getElementById('char_base');
        const artStyle = document.getElementById('art_style');
        const textStyle = document.getElementById('text_style');
        const stampContainer = document.getElementById('stamp_buttons_container');
        const promptOutput = document.getElementById('prompt_output');
        const outputSection = document.getElementById('output_section');
        const copyButton = document.getElementById('copy_button');
        const clearSelectionButton = document.getElementById('clear_selection_button');
        const resetAllButton = document.getElementById('reset_all_button');

        const bgPowerPlay = 'isolated on pure solid white background, simple background, no shadows';

        stampData.forEach(category => {
            const catContainer = document.createElement('div');
            catContainer.className = 'category-container';
            
            const catTitle = document.createElement('div');
            catTitle.className = 'category-title';
            catTitle.textContent = category.name;
            catContainer.appendChild(catTitle);
            
            const btnGrid = document.createElement('div');
            btnGrid.className = 'button-grid';
            
            category.stamps.forEach(stamp => {
                const btn = document.createElement('div');
                btn.className = 'stamp-button';
                btn.setAttribute('data-text', stamp.text);
                btn.setAttribute('data-prompt', stamp.prompt);
                btn.textContent = stamp.text;
                btnGrid.appendChild(btn);
            });
            
            catContainer.appendChild(btnGrid);
            stampContainer.appendChild(catContainer);
        });

        stampContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('stamp-button')) {
                document.querySelectorAll('.stamp-button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                const charSettings = charBase.value.trim();
                const selectedArt = artStyle.value;
                const selectedText = textStyle.value;
                const stampText = e.target.getAttribute('data-text');
                const stampAction = e.target.getAttribute('data-prompt');

                if (!charSettings) {
                    alert('まずは1の「キャラクターの基本設定」を入力してください！');
                    e.target.classList.remove('active');
                    return;
                }

                const finalPrompt = `${charSettings}, ${selectedArt}, ${bgPowerPlay}, typography text "${stampText}" in ${selectedText}, ${stampAction} --v 8.0`;
                
                promptOutput.value = finalPrompt;
                outputSection.style.display = 'flex';
                copyButton.textContent = 'コピー';
            }
        });

        clearSelectionButton.addEventListener('click', () => {
            document.querySelectorAll('.stamp-button').forEach(btn => btn.classList.remove('active'));
            outputSection.style.display = 'none';
            promptOutput.value = '';
        });

        copyButton.addEventListener('click', () => {
            promptOutput.select();
            document.execCommand('copy');
            copyButton.textContent = 'コピー完了！';
        });

        resetAllButton.addEventListener('click', () => {
            if(confirm('設定をすべて初期化しますか？')) {
                charBase.value = '';
                artStyle.selectedIndex = 0;
                textStyle.selectedIndex = 0;
                document.querySelectorAll('.stamp-button').forEach(btn => btn.classList.remove('active'));
                outputSection.style.display = 'none';
                promptOutput.value = '';
            }
        });
    </script>
</body>
</html>

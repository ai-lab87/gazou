    <script>
        const output = document.getElementById('prompt-output');

        function addFromSelect(selectId) {
            const select = document.getElementById(selectId);
            const value = select.value;
            if (!value) return;

            let currentText = output.value.trim();

            if (value.startsWith('--')) {
                if (currentText === '') {
                    output.value = value;
                } else {
                    if (currentText.endsWith(',')) {
                        currentText = currentText.slice(0, -1).trim();
                    }
                    output.value = currentText + ' ' + value;
                }
            } else {
                let paramIndex = currentText.search(/(?:^|\s)--[a-zA-Z]/);
                
                if (paramIndex !== -1) {
                    let promptPart = currentText.substring(0, paramIndex).trim();
                    let paramPart = currentText.substring(paramIndex).trim();
                    
                    if (promptPart === '') {
                        output.value = value + ' ' + paramPart;
                    } else {
                        output.value = promptPart + (promptPart.endsWith(',') ? ' ' : ', ') + value + ' ' + paramPart;
                    }
                } else {
                    if (currentText === '') {
                        output.value = value;
                    } else {
                        output.value = currentText + (currentText.endsWith(',') ? ' ' : ', ') + value;
                    }
                }
            }
            
            const btn = select.nextElementSibling;
            const originalText = btn.innerHTML;
            btn.innerHTML = '✔';
            btn.style.backgroundColor = '#48bb78';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = '#3182ce';
            }, 800);
            
            select.selectedIndex = 0;
        }

        function clearPrompt() { output.value = ''; }
        function copyPrompt() {
            output.select(); document.execCommand('copy');
            const copyBtn = document.querySelector('.btn-copy');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '✅ 完了！'; copyBtn.style.backgroundColor = '#2f855a';
            setTimeout(() => { copyBtn.innerHTML = originalText; copyBtn.style.backgroundColor = '#38a169'; }, 2000);
        }
    </script>

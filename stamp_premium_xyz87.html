<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEスタンプ工場【Ver 5.0】🧪✨</title>
    <style>
        /* --- クールな背景（ダークグラデーション） --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #111827;
            background-image: 
                radial-gradient(at 10% 20%, rgba(31, 41, 58, 0.3) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(17, 24, 39, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: #f3f4f6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 150px; /* 下部の余白を多めに */
        }

        h1 { text-align: center; color: #f1c40f; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }
        .subtitle { text-align: center; color: #f9fafb; font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .description { text-align: center; color: #9ca3af; margin-bottom: 20px; font-size: 13px; }

        .prompt-maker-banner {
            display: block; width: 100%; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 25px; text-decoration: none; box-shadow: 0 6px 20px rgba(0,0,0,0.4); transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .prompt-maker-banner:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4); }
        .prompt-maker-banner img { width: 100%; height: auto; display: block; }

        /* --- セクションのデザイン --- */
        .config-section, .stamp-section {
            background-color: #1f293a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03);
        }

        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .flex-item { flex: 1; min-width: 250px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #f9fafb; font-size: 14px; }
        
        textarea, select, input[type="text"], input[type="url"] {
            width: 100%; padding: 12px; border: 1px solid #374151; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px; background-color: #374151; color: #f9fafb; transition: all 0.2s;
        }
        textarea:focus, select:focus, input[type="text"]:focus, input[type="url"]:focus { outline: none; border-color: #f1c40f; background-color: #1f293a; }
        textarea { resize: vertical; }

        .radio-group { display: flex; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; background: #111827; padding: 10px 15px; border-radius: 6px; border: 1px solid #374151; }
        .radio-group label { margin-bottom: 0; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .radio-group input[type="radio"] { accent-color: #f1c40f; cursor: pointer; }

        .reset-all-btn { background-color: #ef4444; color: white; border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 10px; display: block; margin-left: auto; transition: 0.2s; }
        .reset-all-btn:hover { background-color: #dc2626; }

        /* --- スタンプセクションのボタン --- */
        .category-container { margin-bottom: 20px; }
        .category-title { font-size: 16px; font-weight: bold; color: #f9fafb; margin-bottom: 10px; border-left: 4px solid #f1c40f; padding-left: 10px; }
        .button-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
        .stamp-button { background-color: #374151; border: 1px solid #4b5563; border-radius: 6px; padding: 10px 5px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 12px; color: #f3f4f6; font-weight: bold; }
        .stamp-button:hover { background-color: #4b5563; border-color: #9ca3af; transform: translateY(-1px); }
        .stamp-button.active { border-color: #f1c40f; color: #111827; background-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }
        
        /* --- 出力バー (iPhoneのセーフエリア対応) --- */
        .output-section { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: #111827; 
            /* iPhoneのホームバーと被らないよう、safe-area-inset-bottom を計算に追加 */
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom, 10px)) 20px; 
            box-shadow: 0 -6px 20px rgba(0,0,0,0.5); 
            display: none; align-items: center; justify-content: space-between; z-index: 100; gap: 12px; border-top: 1px solid rgba(241, 196, 15, 0.3); 
        }
        .output-text { flex-grow: 1; border-radius: 4px; padding: 12px; border: 1px solid #374151; font-size: 13px; background-color: #374151; color: #f9fafb; }
        .action-buttons { display: flex; gap: 10px; flex-shrink: 0; }
        .copy-button { background-color: #f1c40f; color: #111827; border: none; border-radius: 4px; padding: 12px 25px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .copy-button:hover { background-color: #f39c12; transform: translateY(-1px); }
        #clear_selection_button { background-color: #6b7280; color: white; border: none; border-radius: 4px; padding: 12px 18px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <a href="https://ai-lab87.github.io/gazou/" target="_blank" class="prompt-maker-banner">
        <img src="https://cdn.midjourney.com/bac8cfe3-f43d-4603-8989-245bb6b95375/0_1.jpeg" alt="プロンプトメーカーはこちら">
    </a>

    <h1>LINEスタンプ工場【Ver 5.0】👑</h1>
    <p class="subtitle">Midjourney v8.1 Alpha 完全対応エディション</p>
    <p class="description">限界突破！大増量70種＆iPhone完全対応！</p>

    <div class="config-section">
        
        <div style="background: rgba(241, 196, 15, 0.1); border: 1px solid #f1c40f; padding: 15px; border-radius: 6px; margin-bottom: 20px; color: #fdf6e3; font-size: 13px; line-height: 1.5;">
            <label style="color: #f1c40f; font-size: 14px; margin-bottom: 5px;">🔥 キャラ・画風の固定モード（v8.1機能）</label>
            <div class="radio-group" style="border-color: #f1c40f; margin-bottom: 10px;">
                <label><input type="radio" name="ref_mode" value="manual" checked> 🖱️ 手動選択モード（MJ画面上で直接画像をアップして選ぶ・推奨）</label>
                <label><input type="radio" name="ref_mode" value="url"> 🔗 URL貼付けモード（Discord等でURLを使いたい方）</label>
            </div>
            <div id="url_input_container" style="display: none;">
                <input type="url" id="ref_image_url" placeholder="例: https://cdn.midjourney.com/.../0_0.png" style="margin-top: 5px;">
                <p style="font-size: 11px; color: #9ca3af; margin-top: 5px;">※入力したURLを元に、自動でImage Prompt(--iw)とStyle Reference(--sref)の呪文を組み込みます。</p>
            </div>
        </div>

        <label id="char_base_label" for="char_base">1. キャラクターの基本設定（日本語OK・必須）</label>
        <textarea id="char_base" rows="2" placeholder="例: 金髪ボブで目が隠れている、青いパーカーと白衣を着ている"></textarea>
        
        <div class="flex-row" style="margin-top: 15px;">
            <div class="flex-item" id="art_style_container">
                <label for="art_style">2. 画風（大増量！）</label>
                <select id="art_style">
                    <option value="anime style, flat color">アニメ調（フラット・基本）</option>
                    <option value="chibi anime style, kawaii">ちびキャラ風</option>
                    <option value="vector art, clean flat illustration">✨ ベクターイラスト風（超スッキリ）</option>
                    <option value="anime screenshot style, 90s cel shading">✨ アニメスクショ風（セル画調）</option>
                    <option value="kawaii pastel goth, dark but cute">✨ 病みかわ・地雷系風</option>
                    <option value="watercolor style, soft lighting">水彩画風</option>
                    <option value="pop art style, vibrant colors">ポップアート風</option>
                    <option value="retro 90s anime style">90年代レトロアニメ風</option>
                    <option value="3D render, cute Pixar style">3D・ピクサー風</option>
                    <option value="pixel art, cute dots">ドット絵風</option>
                    <option value="pastel color, fluffy and dreamy style">パステル・ゆめかわ風</option>
                    <option value="thick oil painting style, impasto">厚塗り・油絵風</option>
                    <option value="manga style, screentones, black and white">白黒マンガ風・トーン入り</option>
                    <option value="dark fantasy style, rugged and moody">✨ ダークファンタジー風（無骨）</option>
                </select>
            </div>
            
            <div class="flex-item" id="text_style_container">
                <label for="text_style">3. フォント感（大増量！）</label>
                <select id="text_style">
                    <option value="bold pop font">太字のポップ風</option>
                    <option value="cute handwritten marker">可愛い手書きマーカー風</option>
                    <option value="thick comic book font, dynamic">✨ アメコミ風ダイナミック極太字</option>
                    <option value="elegant calligraphy">筆文字・カリグラフィー風</option>
                    <option value="dynamic brush pen style, energetic">✨ 力強い筆ペン・躍動感</option>
                    <option value="simple bold sans-serif">シンプルなゴシック太字</option>
                    <option value="Y2K style bubbly font, 3D text">✨ Y2K・ぷっくり3D文字</option>
                    <option value="pixelated retro 8-bit font">✨ ピクセル・レトロゲーム風</option>
                    <option value="neon light text, glowing">ネオンサイン風</option>
                    <option value="luxury gold text, shiny">ゴールド（金箔）風</option>
                    <option value="elegant serif font, magazine style">上品な明朝体・雑誌風</option>
                    <option value="creepy horror style font, dripping">ホラー・おどろおどろしい風</option>
                </select>
            </div>
        </div>

        <div id="text_mode_container">
            <label>4. テキスト生成モード</label>
            <div class="radio-group">
                <label><input type="radio" name="text_mode" value="auto" checked> 🔘 ボタンの文字をそのまま使う</label>
                <label><input type="radio" name="text_mode" value="custom"> ✍️ 好きな文字を手打ちする</label>
                <label><input type="radio" name="text_mode" value="none"> 🚫 文字なし（絵のリアクションのみ）</label>
            </div>
            <input type="text" id="custom_text_input" placeholder="ここに出力したいセリフを入力してください（例：草、それな、等）" style="display: none; margin-bottom: 10px;">
        </div>

        <button id="reset_all_button" class="reset-all-btn">🗑️ 全設定クリア</button>
    </div>

    <div class="stamp-section">
        <label>5. スタンプを選択（大増量！全70種類）</label>
        <div id="stamp_buttons_container"></div>
    </div>

    <div class="output-section" id="output_section">
        <textarea class="output-text" id="prompt_output" readonly rows="2"></textarea>
        <div class="action-buttons">
            <button class="copy-button" id="copy_button">コピー</button>
            <button id="clear_selection_button">閉じる</button>
        </div>
    </div>

    <script>
        // --- モード切替の制御 ---
        const refModeRadios = document.getElementsByName('ref_mode');
        const urlInputContainer = document.getElementById('url_input_container');
        
        refModeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(e.target.value === 'url') {
                    urlInputContainer.style.display = 'block';
                } else {
                    urlInputContainer.style.display = 'none';
                }
            });
        });

        const textModeRadios = document.getElementsByName('text_mode');
        const customTextInput = document.getElementById('custom_text_input');

        textModeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(e.target.value === 'custom') {
                    customTextInput.style.display = 'block';
                    customTextInput.focus();
                } else {
                    customTextInput.style.display = 'none';
                }
            });
        });

        // --- スタンプデータ（全70個へ拡張） ---
        const stampData = [
            { name: '👋 挨拶・基本', stamps: [
                { text: 'ありがとう', prompt: 'bowing, smiling' }, { text: 'おはよう', prompt: 'stretching, yawning' }, { text: 'お疲れ様', prompt: 'relaxing, holding a coffee cup' }, { text: 'こんにちは', prompt: 'waving hands, friendly smile' }, { text: 'おやすみ', prompt: 'sleeping in a blanket, moon and stars' }, { text: '了解', prompt: 'saluting, thumbs up' }, { text: 'NG', prompt: 'crossing arms, X sign' }, { text: 'またね', prompt: 'walking away, waving' }
            ]},
            { name: '💼 ビジネス・敬語 [NEW]', stamps: [
                { text: '承知いたしました', prompt: 'bowing deeply, professional look' }, { text: 'お願いします', prompt: 'praying hands, polite smile' }, { text: 'ありがとうございます', prompt: 'smiling warmly, formal posture' }, { text: '確認しました', prompt: 'holding a clipboard, checking with a pen' }, { text: '申し訳ございません', prompt: 'deep bow of apology, looking down' }, { text: '少々お待ちください', prompt: 'holding up one hand gently, polite pause' }, { text: '完璧です', prompt: 'sparkling eyes, thumbs up, polite expression' }, { text: 'お疲れ様です', prompt: 'handing over a warm tea cup, professional' }
            ]},
            { name: '😃 感情', stamps: [
                { text: 'いいね', prompt: 'giving a thumbs up, winking' }, { text: 'すごい', prompt: 'clapping hands, starry eyes' }, { text: 'わーい', prompt: 'jumping with joy, throwing up hands' }, { text: '泣く', prompt: 'crying, big tears' }, { text: '怒る', prompt: 'angry face, puffing cheeks, steam from ears' }, { text: '焦る', prompt: 'sweating, panicked face' }, { text: '照れる', prompt: 'blushing, covering face with hands' }, { text: 'ショック', prompt: 'shocked face, pale, with a dark cloud' }, { text: '？？', prompt: 'confused, head tilted, question marks' }, { text: 'びっくり', prompt: 'wide eyed, hands on mouth' }
            ]},
            { name: '🛠️ 日常アクション', stamps: [
                { text: 'コーヒー', prompt: 'holding a mug, relaxing, steam rising' }, { text: '食事中', prompt: 'eating ramen with chopsticks' }, { text: '勉強中', prompt: 'reading a book with glasses' }, { text: '仕事中', prompt: 'typing on a laptop, busy look' }, { text: '睡眠中', prompt: 'snoring, zzz marks' }, { text: '電話中', prompt: 'holding a phone to ear' }, { text: '散歩中', prompt: 'walking, listening to music with headphones' }, { text: '運動中', prompt: 'running, sweating' }, { text: 'ゲーム中', prompt: 'holding a controller, intense focus' }, { text: '読書中', prompt: 'sitting and reading an oversized book' }
            ]},
            { name: '📩 メッセージ', stamps: [
                { text: '待って', prompt: 'holding up a hand, stop sign' }, { text: '行く', prompt: 'pointing forward, determined look' }, { text: 'OK', prompt: 'making an O with hands' }, { text: 'キャンセル', prompt: 'making an X with hands' }, { text: 'おめでとう', prompt: 'throwing confetti, holding balloons' }, { text: 'よろしく', prompt: 'bowing deeply, sincere smile' }, { text: 'ごめん', prompt: 'apologizing, hands pressed together, sad eyes' }, { text: '秘密', prompt: 'finger on lips, "shh" pose' }, { text: 'がんばれ', prompt: 'fist pumping, encouraging look' }, { text: 'おねがい', prompt: 'puppy dog eyes, hands clasped' }
            ]},
            { name: '🏕️ オタク・趣味 [NEW]', stamps: [
                { text: '草', prompt: 'laughing uncontrollably, pointing, meme face' }, { text: 'それな', prompt: 'nodding sagely, eyes closed, wise look' }, { text: '沼', prompt: 'sinking slowly into a dark swamp, glowing eyes' }, { text: 'ポチった', prompt: 'clicking a glowing red button aggressively' }, { text: 'ガチャ', prompt: 'pulling a lever, rainbow glowing light bursting out' }, { text: '圧倒的感謝', prompt: 'dogeza, bowing on the floor with a glowing golden aura' }
            ]},
            { name: '🎭 ネタ・推し活', stamps: [
                { text: '虚無', prompt: 'staring into the distance, empty eyes, soul leaving body' }, { text: '尊い', prompt: 'praying hands, shining eyes, overwhelmed by emotion' }, { text: '限界', prompt: 'melted on the floor, exhausted, puddle' }, { text: '神', prompt: 'worshipping, glowing aura' }, { text: '推ししか勝たん', prompt: 'holding a glowing penlight, cheering excitedly' }, { text: '優勝', prompt: 'holding a gold trophy, triumphant pose' }, { text: 'ぴえん', prompt: 'teary puppy eyes, pouting lips, trembling' }, { text: 'ミュート', prompt: 'zipping mouth shut' }
            ]}
        ];

        const charBase = document.getElementById('char_base');
        const refImageUrl = document.getElementById('ref_image_url');
        const artStyle = document.getElementById('art_style');
        const textStyle = document.getElementById('text_style');
        const stampContainer = document.getElementById('stamp_buttons_container');
        const promptOutput = document.getElementById('prompt_output');
        const outputSection = document.getElementById('output_section');
        const copyButton = document.getElementById('copy_button');
        const clearSelectionButton = document.getElementById('clear_selection_button');
        const resetAllButton = document.getElementById('reset_all_button');

        const bgPowerPlay = 'isolated on pure solid white background, simple background, no shadows';

        // スタンプボタンの生成
        stampData.forEach(category => {
            const catContainer = document.createElement('div');
            catContainer.className = 'category-container';
            const catTitle = document.createElement('div');
            catTitle.className = 'category-title';
            catTitle.textContent = category.name;
            catContainer.appendChild(catTitle);
            
            const btnGrid = document.createElement('div');
            btnGrid.className = 'button-grid';
            
            category.stamps.forEach(stamp => {
                const btn = document.createElement('div');
                btn.className = 'stamp-button';
                btn.setAttribute('data-text', stamp.text);
                btn.setAttribute('data-prompt', stamp.prompt);
                btn.textContent = stamp.text;
                btnGrid.appendChild(btn);
            });
            catContainer.appendChild(btnGrid);
            stampContainer.appendChild(catContainer);
        });

        // ボタンクリック時の処理
        stampContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('stamp-button')) {
                document.querySelectorAll('.stamp-button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                const charSettings = charBase.value.trim();
                const selectedRefMode = document.querySelector('input[name="ref_mode"]:checked').value;
                const imageUrl = refImageUrl.value.trim();
                const selectedArt = artStyle.value;
                const buttonText = e.target.getAttribute('data-text');
                const stampAction = e.target.getAttribute('data-prompt');

                if (!charSettings) {
                    alert('キャラクターの基本設定を入力してください！');
                    e.target.classList.remove('active');
                    return;
                }
                
                const selectedText = textStyle.value;
                const selectedMode = document.querySelector('input[name="text_mode"]:checked').value;
                let textPromptPart = '';

                if (selectedMode === 'auto') {
                    textPromptPart = `typography text "${buttonText}" in ${selectedText}, `;
                } else if (selectedMode === 'custom') {
                    const customVal = customTextInput.value.trim();
                    if (!customVal) {
                        alert('手打ちモードが選択されていますが、文字が入力されていません！');
                        e.target.classList.remove('active');
                        return;
                    }
                    textPromptPart = `typography text "${customVal}" in ${selectedText}, `;
                } else if (selectedMode === 'none') {
                    textPromptPart = '';
                }

                // プロンプト構築
                let finalPrompt = '';
                let urlPrefix = '';
                let urlSuffix = '';
                
                // URLモードが選択されていて、かつURLが入力されている場合のみ呪文に追加
                if (selectedRefMode === 'url' && imageUrl) {
                    urlPrefix = `${imageUrl} `;
                    urlSuffix = ` --sref ${imageUrl} --iw 1.5`;
                }
                
                finalPrompt = `${urlPrefix}${charSettings}, ${selectedArt}, ${bgPowerPlay}, ${textPromptPart}${stampAction} --v 8.1${urlSuffix}`;
                
                promptOutput.value = finalPrompt;
                outputSection.style.display = 'flex';
                copyButton.textContent = 'コピー';
            }
        });

        clearSelectionButton.addEventListener('click', () => {
            document.querySelectorAll('.stamp-button').forEach(btn => btn.classList.remove('active'));
            outputSection.style.display = 'none';
            promptOutput.value = '';
        });

        copyButton.addEventListener('click', () => {
            promptOutput.select();
            document.execCommand('copy');
            copyButton.textContent = 'コピー完了！';
        });

        resetAllButton.addEventListener('click', () => {
            if(confirm('設定をすべて初期化しますか？')) {
                charBase.value = '';
                refImageUrl.value = '';
                artStyle.selectedIndex = 0;
                textStyle.selectedIndex = 0;
                
                document.querySelector('input[value="manual"]').checked = true;
                urlInputContainer.style.display = 'none';
                
                document.querySelector('input[value="auto"]').checked = true;
                customTextInput.style.display = 'none';
                customTextInput.value = '';
                
                document.querySelectorAll('.stamp-button').forEach(btn => btn.classList.remove('active'));
                outputSection.style.display = 'none';
                promptOutput.value = '';
            }
        });
    </script>
</body>
</html>
